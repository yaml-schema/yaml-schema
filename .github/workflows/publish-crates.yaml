# Publishes the yaml-schema crate to crates.io when a version tag is pushed.
#
# Prerequisites:
# - Repository secret CARGO_REGISTRY_TOKEN: crates.io API token with publish scope.
# - Tag must match [package].version in Cargo.toml after optional leading "v"
#   (e.g. tag v0.9.2 or 0.9.2 for version 0.9.2).
#
# See https://github.com/yaml-schema/yaml-schema/issues/19
name: Publish crates.io

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.94.0
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Verify tag matches Cargo.toml version
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          ref_tag="${GITHUB_REF_NAME}"
          normalized="${ref_tag#v}"
          cargo_ver="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="yaml-schema") | .version')"
          echo "cargo_version=${cargo_ver}" >> "${GITHUB_OUTPUT}"
          if [[ "${normalized}" != "${cargo_ver}" ]]; then
            echo "::error::Tag '${ref_tag}' (normalized: '${normalized}') does not match Cargo.toml version '${cargo_ver}'"
            exit 1
          fi

      - name: Check SemVer (format)
        id: semver
        uses: aisrael/check-semver@v1
        with:
          version: ${{ steps.versions.outputs.cargo_version }}
          check_tags: false

      - name: Assert SemVer check passed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.semver.outputs.valid }}" != "true" ]]; then
            echo "::error::check-semver: ${{ steps.semver.outputs.message }}"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy

      - name: Tests
        run: cargo test --verbose

      - name: Dry-run publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
